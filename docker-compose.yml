services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      DATABASE_URL: mysql://comshopx:comshopx_password@mysql:3306/comshopx
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: change-me
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: comshopx
      MYSQL_USER: comshopx
      MYSQL_PASSWORD: comshopx_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped

volumes:
  mysql_data:
