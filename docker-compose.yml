services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.comshopx-http.rule=Host(`r9fjyavpfql18slefxw46vx9.110.164.222.217.sslip.io`)"
      - "traefik.http.routers.comshopx-http.entrypoints=http"
      - "traefik.http.routers.comshopx-http.service=comshopx"
      - "traefik.http.routers.comshopx-https.rule=Host(`r9fjyavpfql18slefxw46vx9.110.164.222.217.sslip.io`)"
      - "traefik.http.routers.comshopx-https.entrypoints=https"
      - "traefik.http.routers.comshopx-https.tls=true"
      - "traefik.http.routers.comshopx-https.service=comshopx"
      - "traefik.http.services.comshopx.loadbalancer.server.port=3000"
    environment:
      DATABASE_URL: mysql://comshopx:comshopx_password@mysql:3306/comshopx
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: change-me
      NEXTAUTH_URL: http://localhost:3000
      ADMIN_PASSWORD: admin1234
      COOKIE_SECURE: "false"
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: comshopx
      MYSQL_USER: comshopx
      MYSQL_PASSWORD: comshopx_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "comshopx", "-pcomshopx_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:
